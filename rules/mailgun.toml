# Mailgun — single-string auth (key-*)
[service]
id = "mailgun"
display_name = "Mailgun"
auth_class = "single"
search_keywords = ["mailgun", "MAILGUN_API_KEY"]

[[patterns]]
name = "mailgun-api-key"
component = "secret"
regex = '''\bkey-[a-f0-9]{32}\b'''
keywords = ["key-"]

[[patterns]]
name = "mailgun-private-api-key"
component = "secret"
regex = '''(?i)mailgun[^\n=:]{0,40}[:=]\s*['"]?([a-zA-Z0-9]{72})['"]?'''
secret_group = 1
keywords = ["mailgun"]

[allowlists]
paths = ['''(^|/)node_modules/''', '''(^|/)vendor/''', '''(^|/)\.git/''', '''(^|/)dist/''', '''(^|/)build/''']
match_regexes = ['''key-(?:0+|XXXX+|YOUR)''']
