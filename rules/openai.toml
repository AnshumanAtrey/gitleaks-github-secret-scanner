# OpenAI — single-string auth (sk-* token works alone)
[service]
id = "openai"
display_name = "OpenAI"
auth_class = "single"
search_keywords = ["openai", "OPENAI_API_KEY"]

[[patterns]]
name = "openai-api-key"
component = "secret"
regex = '''\bsk-(?:proj-)?[A-Za-z0-9_-]{40,}\b'''
keywords = ["sk-"]

[allowlists]
paths = [
  '''(^|/)node_modules/''', '''(^|/)vendor/''', '''(^|/)\.git/''',
  '''(^|/)dist/''', '''(^|/)build/''',
]
match_regexes = [
  '''sk-(?:proj-)?(?:xxx+|YOUR|abc+|0+|example)'''
]
