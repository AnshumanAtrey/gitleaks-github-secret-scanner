# GCP service account JSON — the entire JSON file is the credential
[service]
id = "gcp-service-account"
display_name = "Google Cloud service account JSON"
auth_class = "single"
search_keywords = ["service_account", "google_service_account", "GOOGLE_APPLICATION_CREDENTIALS"]

# Match the type:"service_account" marker + private_key block
[[patterns]]
name = "gcp-service-account-private-key"
component = "secret"
regex = '''"private_key"\s*:\s*"(-----BEGIN PRIVATE KEY-----[\s\S]+?-----END PRIVATE KEY-----)'''
secret_group = 1
keywords = ["service_account", "private_key"]

[allowlists]
paths = ['''(^|/)node_modules/''', '''(^|/)vendor/''', '''(^|/)\.git/''', '''(^|/)dist/''', '''(^|/)build/''']
