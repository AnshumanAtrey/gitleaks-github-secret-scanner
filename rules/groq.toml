# Groq — single-string auth (gsk_*)
[service]
id = "groq"
display_name = "Groq"
auth_class = "single"
search_keywords = ["groq", "GROQ_API_KEY"]

[[patterns]]
name = "groq-api-key"
component = "secret"
regex = '''\bgsk_[A-Za-z0-9]{52}\b'''
keywords = ["gsk_"]

[allowlists]
paths = ['''(^|/)node_modules/''', '''(^|/)vendor/''', '''(^|/)\.git/''', '''(^|/)dist/''', '''(^|/)build/''']
match_regexes = ['''gsk_(?:0+|XXXX+|YOUR)''']
